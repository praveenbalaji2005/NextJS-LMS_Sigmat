<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELECT ROLE</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #e6f2ff;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            color: white;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, blue, purple);
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            flex-grow: 1;
        }

        .box-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
            width: 250px;
            flex: 1 0 0;
        }

        .box:nth-child(1) { background-color: #fff0f0; }
        .box:nth-child(2) { background-color: #e6f9ff; }
        .box:nth-child(3) { background-color: #fff5cc; }

        .box:hover { transform: translateY(-5px); }

        img {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid #333;
        }

        h3 {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 10px 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.1);
            position: absolute;
            bottom: 0;
            left: 0;
            font-size: small;
        }
    </style>
</head>
<body>
    <header>
        <h1>Select the type of role to access your LMS.</h1>
    </header>

    <div class="container">
        <a href="admin.html" class="box-link">
            <div class="box">
                <img src="admin.png" alt="Admin Icon">
                <h3>Admin</h3>
            </div>
        </a>
        <a href="instructor.html" class="box-link">
            <div class="box">
                <img src="instructor.png" alt="Instructor Icon">
                <h3>Instructor</h3>
            </div>
        </a>
        <a href="student.html" class="box-link">
            <div class="box">
                <img src="student.png" alt="Student Icon">
                <h3>Student</h3>
            </div>
        </a>
    </div>

    <footer>
        @2025 LMS All rights reserved
    </footer>
</body>
</html>
